name: LaTeX Smoke

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  latex-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install tinytex R package
        run: Rscript -e "install.packages('tinytex', repos = 'https://cloud.r-project.org')"

      - name: Bootstrap LaTeX
        run: Rscript tools/bootstrap_latex.R

      - name: Build main LaTeX smoke fixture
        shell: bash
        run: |
          bash tools/build_paper.sh --fixture-dir=testing/latex_smoke/main
          test -f testing/latex_smoke/main/djm_main.pdf

      - name: Build IA LaTeX smoke fixture
        shell: bash
        run: |
          bash tools/build_ia_paper.sh --fixture-dir=testing/latex_smoke/ia
          test -f testing/latex_smoke/ia/ia_main.pdf
