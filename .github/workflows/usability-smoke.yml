name: Usability Smoke

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Validate repo docs and manifests
        run: Rscript tools/validate_repo_docs.R

      - name: Bootstrap packages with Unix wrapper
        if: runner.os != 'Windows'
        shell: bash
        run: bash tools/bootstrap_packages.sh

      - name: Bootstrap packages with Windows PowerShell wrapper
        if: runner.os == 'Windows'
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File tools\bootstrap_packages.ps1

      - name: Validate package bootstrap check mode
        run: Rscript tools/bootstrap_packages.R --check

      - name: Bootstrap data with Unix wrapper
        if: runner.os != 'Windows'
        shell: bash
        run: bash tools/bootstrap_data.sh

      - name: Bootstrap data with Windows PowerShell wrapper
        if: runner.os == 'Windows'
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File tools\bootstrap_data.ps1

      - name: Validate data bootstrap check mode
        run: Rscript tools/bootstrap_data.R --check

      - name: Verify doctor with Unix wrapper
        if: runner.os != 'Windows'
        shell: bash
        run: bash tools/doctor.sh --check-only

      - name: Verify doctor with Windows PowerShell wrapper
        if: runner.os == 'Windows'
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File tools\doctor.ps1 --check-only

      - name: Smoke main entrypoints
        run: |
          Rscript tools/bootstrap_data.R --help
          Rscript tools/run_figure1_simulation.R --help
          Rscript _run_full_replication.R --help
          Rscript _run_all_unconditional.R --list
          Rscript _run_all_conditional.R --help
          Rscript ia/_run_ia_estimation.R --list
          Rscript ia/_run_ia_results.R --help
          Rscript ia/_create_ia_latex.R --help
          Rscript ia/_run_ia_full.R --help
          Rscript _run_complete_replication.R --help
          Rscript tools/audit_run.R --help

      - name: Smoke Unix wrapper entrypoints
        if: runner.os != 'Windows'
        shell: bash
        run: |
          bash tools/bootstrap_packages.sh --help
          bash tools/bootstrap_data.sh --help
          bash tools/doctor.sh --help
          bash tools/rebuild_fast_backends.sh --help
          bash tools/run_conditional_smoke.sh --help
          bash tools/run_full_replication.sh --help
          bash tools/run_figure1_simulation.sh --help
          bash tools/build_paper.sh --help
          bash tools/run_ia_smoke.sh --help
          bash tools/run_ia_full.sh --help
          bash tools/build_ia_paper.sh --help
          bash tools/run_complete_replication.sh --help
          bash tools/audit_run.sh --help

      - name: Smoke Windows PowerShell wrappers
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File tools\bootstrap_packages.ps1 --help
          powershell -ExecutionPolicy Bypass -File tools\bootstrap_data.ps1 --help
          powershell -ExecutionPolicy Bypass -File tools\doctor.ps1 --help
          powershell -ExecutionPolicy Bypass -File tools\rebuild_fast_backends.ps1 -Help
          powershell -ExecutionPolicy Bypass -File tools\run_conditional_smoke.ps1 -Help
          powershell -ExecutionPolicy Bypass -File tools\run_full_replication.ps1 -Help
          powershell -ExecutionPolicy Bypass -File tools\run_figure1_simulation.ps1 -Help
          powershell -ExecutionPolicy Bypass -File tools\build_paper.ps1 -Help
          powershell -ExecutionPolicy Bypass -File tools\run_ia_smoke.ps1 -Help
          powershell -ExecutionPolicy Bypass -File tools\run_ia_full.ps1 -Help
          powershell -ExecutionPolicy Bypass -File tools\build_ia_paper.ps1 -Help
          powershell -ExecutionPolicy Bypass -File tools\run_complete_replication.ps1 -Help
          powershell -ExecutionPolicy Bypass -File tools\audit_run.ps1 -Help

      - name: Smoke Windows Command Prompt wrappers
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cmd /c tools\bootstrap_packages.cmd --help
          cmd /c tools\bootstrap_data.cmd --help
          cmd /c tools\doctor.cmd --help
          cmd /c tools\rebuild_fast_backends.cmd -Help
          cmd /c tools\run_conditional_smoke.cmd -Help
          cmd /c tools\run_full_replication.cmd -Help
          cmd /c tools\run_figure1_simulation.cmd -Help
          cmd /c tools\build_paper.cmd -Help
          cmd /c tools\run_ia_smoke.cmd -Help
          cmd /c tools\run_ia_full.cmd -Help
          cmd /c tools\build_ia_paper.cmd -Help
          cmd /c tools\run_complete_replication.cmd -Help
          cmd /c tools\audit_run.cmd -Help
